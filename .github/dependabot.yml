# Dependabot configuration template.
# Copy this file to .github/dependabot.yml in a repository and enable only the
# package ecosystems that apply to that repository.
#
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # GitHub Actions workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  # npm or yarn projects. Enable when package.json/package-lock.json/yarn.lock exists.
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 30
    labels:
      - "dependencies"


  # Python pip projects. Enable when requirements.txt, pyproject.toml, or Pipfile exists.
  - package-ecosystem: "pip"
    directory: "/api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 30
    labels:
      - "dependencies"


  # Docker projects. Enable when Dockerfile exists.
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      docker-dependencies:
        patterns:
          - "*"
